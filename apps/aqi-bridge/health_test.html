<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASE AQI Drone - Health Monitor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --border-color: #334155;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .output-wrapper {
            background-color: #0b1120;
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-idle {
            background-color: #334155;
            color: #cbd5e1;
        }

        .status-loading {
            background-color: #ca8a04;
            color: #fef08a;
            animation: pulse-loading 1.5s infinite;
        }

        .status-success {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .status-error {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--error-color);
        }

        @keyframes pulse-loading {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        pre {
            margin: 0;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #475569 #0b1120;
        }

        pre::-webkit-scrollbar {
            width: 8px;
        }

        pre::-webkit-scrollbar-track {
            background: #0b1120;
        }

        pre::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 4px;
        }

        .timestamp {
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
    <!-- Include Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h1>AQI Bridge Health Monitor</h1>
        
        <div class="controls">
            <button id="fetchBtn" onclick="fetchHealth()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
                Check Health
            </button>
        </div>

        <div class="output-wrapper">
            <div class="output-header">
                <span>Response Data</span>
                <span id="statusBadge" class="status-badge status-idle">Ready</span>
            </div>
            <pre id="jsonOutput">Click the button above to fetch health data...</pre>
            <div style="text-align: right; margin-top: 0.5rem;">
                <span id="timestamp" class="timestamp"></span>
            </div>
        </div>
    </div>

    <script>
        async function fetchHealth() {
            const btn = document.getElementById('fetchBtn');
            const output = document.getElementById('jsonOutput');
            const statusBadge = document.getElementById('statusBadge');
            const timestamp = document.getElementById('timestamp');

            // Update UI to loading state
            btn.disabled = true;
            btn.style.opacity = '0.7';
            output.textContent = 'Fetching data...';
            output.style.color = '#94a3b8';
            
            statusBadge.textContent = 'Loading';
            statusBadge.className = 'status-badge status-loading';
            
            try {
                // Fetch the API
                const response = await fetch('http://localhost:8765/health');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Format and display the JSON beautifully
                output.textContent = JSON.stringify(data, null, 2);
                
                // Add some basic syntax highlighting logic if desired, or just rely on CSS
                output.style.color = '#e2e8f0';

                // Update UI to success state
                statusBadge.textContent = 'Success';
                statusBadge.className = 'status-badge status-success';
                
            } catch (error) {
                // Handle errors
                output.textContent = `Error fetching health data:\n${error.message}\n\nMake sure the API server is running on localhost:8765.`;
                output.style.color = 'var(--error-color)';
                
                // Update UI to error state
                statusBadge.textContent = 'Error';
                statusBadge.className = 'status-badge status-error';
            } finally {
                // Reset button and update timestamp
                btn.disabled = false;
                btn.style.opacity = '1';
                const now = new Date();
                timestamp.textContent = `Last updated: ${now.toLocaleTimeString()}`;
                
                // Add a small animation effect to the JSON output container
                const wrapper = document.querySelector('.output-wrapper');
                wrapper.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    wrapper.style.transition = 'transform 0.15s ease-out';
                    wrapper.style.transform = 'scale(1)';
                }, 50);
            }
        }
    </script>

</body>
</html>
