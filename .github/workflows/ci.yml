name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bridge/requirements.txt

      - name: Install dependencies
        run: pip install -r bridge/requirements.txt pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: ruff check bridge/ tests/

      - name: Run test suite
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sase-aqi-bridge:ci .
